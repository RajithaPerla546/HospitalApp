<form [formGroup]="patientForm" (ngSubmit)="onSubmit()">
  <div>
    <label>Name:</label>
    <input type="text" formControlName="name">
  </div>

  <div>
    <label>Age:</label>
    <input type="number" formControlName="age">
  </div>

  <div>
    <label>Disease:</label>
    <input type="text" formControlName="disease">
  </div>

  <button type="submit">Submit</button>
</form>
